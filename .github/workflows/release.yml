name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p dist
          zip -r "dist/AnkiPdffer-${VERSION}.zip" \
            __init__.py \
            manifest.json \
            -x "*.pyc" -x "__pycache__/*" -x "*.DS_Store" -x "settings.json" -x "dist/*"
          echo "ZIP=dist/AnkiPdffer-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          files: ${{ env.ZIP }}
          body: |
            ## AnkiPdffer v${{ steps.version.outputs.VERSION }}

            ### Install
            1. Download `AnkiPdffer-${{ steps.version.outputs.VERSION }}.zip` below
            2. Anki → Tools → Add-ons → Install from file…
            3. Restart Anki

            See [README](README.md) for full documentation.
